    <!-- Prevent flash of wrong theme: apply saved preference; default is light -->
    <script>
      (function () {
        var saved = localStorage.getItem("teevexa_theme");
        if (saved === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
